<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}dbdiff{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <a class="skip" href="#main">Skip to content</a>
  <header class="topbar">
    <a href="/" class="brand" aria-label="dbdiff — home">
      <svg class="mark" width="26" height="26" viewBox="0 0 26 26" fill="none" aria-hidden="true">
        <rect x="3"  y="4.5"  width="5.5" height="3.6" rx="1.3" fill="#3FB179"/>
        <rect x="10.5" y="4.5"  width="12.5" height="3.6" rx="1.3" fill="#46566480"/>
        <rect x="3"  y="11.2" width="5.5" height="3.6" rx="1.3" fill="#D7A23E"/>
        <rect x="10.5" y="11.2" width="12.5" height="3.6" rx="1.3" fill="#46566480"/>
        <rect x="3"  y="17.9" width="5.5" height="3.6" rx="1.3" fill="#E07565"/>
        <rect x="10.5" y="17.9" width="8.5" height="3.6" rx="1.3" fill="#46566480"/>
      </svg>
      <span class="wordmark"><span class="wm-db">db</span><span class="wm-diff">diff</span></span>
    </a>
    <span class="tagline">MySQL <span class="slash">/</span> MariaDB snapshot diff</span>
  </header>
  <main id="main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
